<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Galaxy Media Gallery</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

</head>



<body class="bg-dark text-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-black">
<div class="container">

<a class="navbar-brand" href="index.html">Galaxy Explorer</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="nav">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
<li class="nav-item"><a class="nav-link" href="explore.html">Explore</a></li>
<li class="nav-item"><a class="nav-link active" href="gallery.html">Gallery</a></li>
<li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
</ul>
</div>

</div>
</nav>

<!-- HEADER -->
<div class="container my-5">
<h1 class="mb-3">Media Gallery</h1>
<p>Explore galaxies, black holes, and cosmic events.</p>
</div>

<!-- FILTER BUTTONS -->
<div class="container mb-4">
<div class="d-flex gap-2 flex-wrap">

<button class="btn btn-outline-light" data-filter="all">All</button>
<button class="btn btn-outline-light" data-filter="photo">Photos</button>
<button class="btn btn-outline-light" data-filter="video">Videos</button>

</div>
</div>

<!-- GALLERY GRID -->
<div class="container">

<div class="row g-4">

<!-- ITEM 1 -->
<div class="col-6 col-md-4 col-lg-3 gallery-item" data-type="photo">
<div class="card bg-dark text-light">

<a href="#">
<img src="assets/phantom-galaxy.png" class="card-img-top" alt="Galaxy" >
</a>

<div class="card-body">
<h6 class="card-title">Phantom Galaxy</h6>
</div>

</div>
</div>

<!-- ITEM 2 -->
<div class="col-6 col-md-4 col-lg-3 gallery-item" data-type="photo">
<div class="card bg-dark text-light">

<a href="#">
<img src="assets/blackhole.jpg" class="card-img-top" alt="Black Hole" >
</a>

<div class="card-body">
<h6 class="card-title">Black Hole</h6>
</div>

</div>
</div>

<!-- ITEM 3 (VIDEO) -->
<div class="col-6 col-md-4 col-lg-3 gallery-item" data-type="video">
<div class="card bg-dark text-light">

<div class="ratio ratio-16x9" >
<iframe src="https://www.youtube.com/embed/Mz86UFPMC20" allowfullscreen></iframe>
</div>

<div class="card-body">
<h6 class="card-title">The universe story</h6>
</div>

</div>
</div>

<!-- ITEM 4 -->
<div class="col-6 col-md-4 col-lg-3 gallery-item" data-type="photo">
<div class="card bg-dark text-light">

<a href="#">
<img src="assets/Supernova.jpg" class="card-img-top" alt="Supernova">
</a>

<div class="card-body">
<h6 class="card-title">Supernova</h6>
</div>

</div>
</div>

<!-- Duplicate more items as needed -->
<!-- ITEM 5 -->
<div class="col-6 col-md-4 col-lg-3 gallery-item" data-type="photo">
<div class="card bg-dark text-light">
<img src="assets/pulsar.jpg" class="card-img-top">
<div class="card-body">
<h6>Pulsar</h6>
</div>
</div>
</div>

<!-- ITEM 6 -->
<div class="col-6 col-md-4 col-lg-3 gallery-item" data-type="photo">
<div class="card bg-dark text-light">
<img src="assets/nebula.jpg" class="card-img-top">
<div class="card-body">
<h6>Nebula</h6>
</div>
</div>
</div>

</div>

</div>

<!-- FOOTER -->
<footer class="text-center p-4 mt-5 bg-black">
<p>Galaxy Explorer Project</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>


<script>
const buttons = document.querySelectorAll('[data-filter]');
const items = document.querySelectorAll('.gallery-item');

buttons.forEach(button => {
    button.addEventListener('click', () => {
        const filter = button.getAttribute('data-filter');

        items.forEach(item => {
            const type = item.getAttribute('data-type');

            if (filter === 'all' || filter === type) {
                item.style.display = 'block';
            } else {
                item.style.display = 'none';
            }
        });
    });
});
</script>

</body>
</html>
