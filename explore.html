  <button class="btn btn-secondary" onclick="setTopView()">Top View</button>
  <button class="btn btn-secondary" onclick="setSideView()">Side View</button>

  <button class="btn btn-secondary" onclick="toggleRotation()">Toggle Rotation</button>
  
<button class="btn btn-warning" onclick="togglePlanetMotion()">

<!-- YOUR SCRIPT -->
<script type="module" src="js/script.js"></script>

<!-- CONTROL BUTTON FUNCTIONS -->
<script>
function setFrontView() {
  window.camera.position.set(0, 2, 6);
}

function setTopView() {
  window.camera.position.set(0, 10, 0);
}

function setSideView() {
  window.camera.position.set(6, 2, 0);
}

function toggleRotation() {
  window.controls.autoRotate = !window.controls.autoRotate;
}
</script>
<script>
function showRocket() {
  if (window.rocketModel) {
    window.rocketModel.visible = true;
  }

  if (window.solarSystemModel) {
    window.solarSystemModel.visible = false;
  }

  window.camera.position.set(0, 1, 3);
}

function showSolarSystem() {
  if (window.rocketModel) {
    window.rocketModel.visible = false;
  }

  if (window.solarSystemModel) {
    window.solarSystemModel.visible = true;
  }

  window.camera.position.set(0, 4, 10);
}
</script>

<script>
function toggleSound() {
  if (!window.sound) return;

  if (window.listener.context.state === 'suspended') {
    window.listener.context.resume();
  }

  if (window.sound.isPlaying) {
    window.sound.pause();
  } else {
    window.sound.play();
  }
}
</script>
